<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Веб форма проекта</title>

  <style>
    body {
      font-family: sans-serif;
      display: flex;
      justify-content: center;
      padding: 50px;
      background-color: #f4f4f9;
    }

    .form-container {
      background: white;
      padding: 25px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      width: 300px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-bottom: 15px;
      border: 1px solid #ccc;
      border-radius: 5px;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #4CAF50;
      border: none;
      color: white;
      font-weight: bold;
      cursor: pointer;
      border-radius: 5px;
    }

    button:hover {
      background: #45a049;
    }
  </style>
</head>

<body>

<div class="form-container">
  <h2>Форма обратной связи</h2>

  <form id="feedbackForm">
    <input type="text" id="userName" placeholder="Ваше имя" required>
    <input type="email" id="userEmail" placeholder="Ваш Email" required>
    <button type="submit">Отправить</button>
  </form>
</div>

<script type="module">
  // Импорт Firebase
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
  import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

  // ВСТАВЬ СВОИ КЛЮЧИ!!!
  const firebaseConfig = {
    apiKey: "AIzaSyDgQnE-vuZXyqj5-tIs6Hmp7jI7hHVIn0U",
    authDomain: "po241-c5ab0.firebaseapp.com",
    projectId: "po241-c5ab0",
    storageBucket: "po241-c5ab0.firebasestorage.app",
    messagingSenderId: "487801970974",
    appId: "1:487801970974:web:91e7956215fde16ce1290f"
  };

  // Инициализация
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // Обработка формы
  document.getElementById("feedbackForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    const nameInput = document.getElementById("userName").value;
    const emailInput = document.getElementById("userEmail").value;

    try {
      await addDoc(collection(db, "requests"), {
        name: nameInput,
        email: emailInput,
        timestamp: new Date()
      });

      alert("Данные успешно отправлены!");
      document.getElementById("feedbackForm").reset();

    } catch (error) {
      console.error("Ошибка:", error);
      alert("Ошибка при отправке!");
    }
  });
</script>

</body>
</html>
